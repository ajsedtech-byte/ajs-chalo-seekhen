<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Open book icon -->
  <g transform="translate(256, 200)">
    <!-- Left page -->
    <path d="M-10,-60 C-10,-60 -90,-70 -130,-50 L-130,70 C-90,50 -10,60 -10,60 Z" fill="url(#bookGrad)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M10,-60 C10,-60 90,-70 130,-50 L130,70 C90,50 10,60 10,60 Z" fill="url(#bookGrad)" opacity="0.85"/>
    <!-- Spine -->
    <line x1="0" y1="-65" x2="0" y2="65" stroke="#F97316" stroke-width="3" opacity="0.5"/>
    <!-- Page lines left -->
    <line x1="-100" y1="-20" x2="-30" y2="-25" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="-105" y1="0" x2="-25" y2="-3" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="-108" y1="20" x2="-22" y2="18" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <!-- Page lines right -->
    <line x1="100" y1="-20" x2="30" y2="-25" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="105" y1="0" x2="25" y2="-3" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="108" y1="20" x2="22" y2="18" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  </g>
  <!-- Text: AJ's -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="64" fill="#FFFFFF" letter-spacing="-1">AJ's</text>
  <!-- Text: Learning -->
  <text x="256" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="48" fill="#FFFFFF" opacity="0.85" letter-spacing="2">Learning</text>
</svg>
